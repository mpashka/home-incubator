# Dev defaults. The extension posts to http://localhost:8080/api/ingest.
quarkus.http.port=8080

# Allow the extension (and the Vue viewer) to call the API from the browser.
quarkus.http.cors=true
quarkus.http.cors.origins=/.*/
quarkus.http.cors.methods=GET,POST,OPTIONS

# Persistence.
quarkus.datasource.db-kind=postgresql
quarkus.hibernate-orm.database.generation=update

# Dev: connect to the local PostgreSQL (an explicit JDBC url disables Dev Services /
# throwaway containers). Create the db once:
#   sudo -u postgres psql -c "CREATE ROLE shopping LOGIN PASSWORD 'shopping'"
#   sudo -u postgres createdb -O shopping shopping
%dev.quarkus.datasource.username=shopping
%dev.quarkus.datasource.password=shopping
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/shopping

# LLM normalization (phase 5). Disabled by default. Enable to drain captures on a
# schedule; POST /api/normalize/run always works regardless of this flag.
shopping.normalize.enabled=false
shopping.normalize.interval=5m
shopping.normalize.batch-size=10

# LLM provider: "yandex" (default, uses your Yandex quota) or "anthropic".
shopping.llm.provider=yandex

# Yandex AI Studio — OpenAI-compatible Chat Completions. Reads YANDEX_AI_TOKEN and
# YANDEX_FOLDER_ID from the environment (models are addressed as gpt://<folder>/<model>).
shopping.llm.yandex.base-url=${YANDEX_AI_BASE_URL:https://ai.api.cloud.yandex.net/v1}
shopping.llm.yandex.model=qwen3.6-35b-a3b/latest
shopping.llm.yandex.folder-id=${YANDEX_FOLDER_ID:}
shopping.llm.yandex.token=${YANDEX_AI_TOKEN:}
shopping.llm.yandex.max-tokens=16000
shopping.llm.yandex.temperature=0.1

# Anthropic — Claude with schema-enforced structured output. Needs ANTHROPIC_API_KEY
# (or an `ant auth login` profile). Only used when shopping.llm.provider=anthropic.
shopping.llm.anthropic.model=claude-opus-4-8
shopping.llm.anthropic.max-tokens=16000

# Image matching (phase 6): perceptual-hash variant photos and cluster near-identical
# ones. POST /api/match/run works regardless of the enabled flag.
shopping.match.enabled=false
shopping.match.interval=10m
shopping.match.batch-size=50
shopping.match.threshold=10

# Production: supply a real datasource via env / config, e.g.
# quarkus.datasource.username=shopping
# quarkus.datasource.password=shopping
# quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/shopping
