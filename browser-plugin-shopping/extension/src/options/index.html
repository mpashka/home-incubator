<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shopping Collector — Wishlist</title>
    <style>
      body { font: 14px/1.5 system-ui, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; color: #18181b; }
      h1 { font-size: 18px; }
      label { display: block; font-weight: 600; margin: 16px 0 4px; }
      .hint { color: #71717a; font-weight: 400; font-size: 12px; }
      input, textarea { width: 100%; box-sizing: border-box; padding: 8px; font: inherit; }
      textarea { min-height: 72px; resize: vertical; }
      button { margin-top: 16px; padding: 8px 14px; cursor: pointer; }
      .queries { margin-top: 20px; border-top: 1px solid #e4e4e7; padding-top: 12px; }
      .q { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f4f4f5; }
      .q .text { flex: 1; }
      .q a { text-decoration: none; padding: 3px 8px; border-radius: 5px; background: #f4f4f5; color: #18181b; font-size: 12px; }
      .saved { color: #16a34a; margin-left: 10px; }
    </style>
  </head>
  <body>
    <h1>Wishlist</h1>
    <p class="hint">
      Describe what you want. The extension generates search queries as the cartesian product
      of the attribute groups. Opening a query runs the marketplace search, which the collector
      captures automatically.
    </p>

    <label for="category">Category</label>
    <input id="category" placeholder="планшет" />

    <label for="keywords">Keywords <span class="hint">— comma-separated, added to every query</span></label>
    <input id="keywords" placeholder="global, glass" />

    <label for="attributes">Attribute groups <span class="hint">— one group per line, terms comma-separated</span></label>
    <textarea id="attributes" placeholder="11 дюймов, 12 дюймов&#10;snapdragon 8"></textarea>

    <button id="save">Save</button><span class="saved" id="saved"></span>

    <div class="queries">
      <strong>Generated queries</strong>
      <div id="list"></div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
