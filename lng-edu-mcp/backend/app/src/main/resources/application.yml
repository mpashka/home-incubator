spring:
  application:
    name: lng-edu-mcp
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lngedu}
    username: ${DB_USERNAME:lngedu}
    password: ${DB_PASSWORD:lngedu}
  jpa:
    hibernate:
      # Schema is owned by Flyway; Hibernate only validates it (AGENTS.md rule 6).
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          google:
            # No real Google credentials in this environment: dummy defaults so the app still boots.
            # Live Google login is wired via GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET env vars.
            client-id: ${GOOGLE_CLIENT_ID:dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy-client-secret}
            scope: openid,email,profile
            # provider `google` is built-in; redirect defaults to {baseUrl}/login/oauth2/code/google
  jackson:
    time-zone: UTC
  ai:
    mcp:
      server:
        # MCP server for ChatGPT/LLM clients, exposed over HTTP/SSE in this same app/port.
        enabled: true
        name: lng-edu
        version: 0.1.0
        type: SYNC
        instructions: >-
          Language-learning backend. Tools cover the vertical scenario: list learners and books,
          start a learning session, fetch the next reading block, record its result and unknown
          words, finish the session, and read daily stats. Mutating tools take a request_id and are
          idempotent on replay.
        sse-message-endpoint: /mcp/message
        sse-endpoint: /sse

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
